backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

locale: es

collections:
  - name: "catalogo_cursos"
    label: "Catálogo de Cursos"
    files:
      - label: "Todos los Cursos"
        name: "cursos_data"
        file: "data/cursos.json"
        fields:
          - label: "Lista de Cursos"
            name: "cursos"
            widget: "list"
            summary: "{{fields.nombre}} — ${{fields.precio}} MXN — {{fields.nivel}}"
            fields:
              - { label: "ID único", name: "id", widget: "string", hint: "Sin espacios ni caracteres especiales. Ej: costura-avanzada" }
              - { label: "Nombre del curso", name: "nombre", widget: "string" }
              - { label: "Precio (MXN)", name: "precio", widget: "number", value_type: int, min: 0 }
              - { label: "Duración", name: "duracion", widget: "string", hint: "Ej: 8 semanas" }
              - label: "Nivel"
                name: "nivel"
                widget: "select"
                options: ["Principiante", "Intermedio", "Avanzado"]
              - { label: "Instructor", name: "instructor", widget: "string" }
              - { label: "Horario", name: "horario", widget: "string", hint: "Ej: Lunes y Miércoles · 18:00 – 21:00" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - label: "Incluye"
                name: "incluye"
                widget: "list"
                field: { label: "Item", name: "item", widget: "string" }
              - label: "Objetivos de aprendizaje"
                name: "objetivos"
                widget: "list"
                field: { label: "Objetivo", name: "objetivo", widget: "string" }
              - { label: "Imagen del curso", name: "imagen", widget: "image", required: false }
              - { label: "ID Tienda Lemon Squeezy", name: "lemon_store", widget: "string", default: "351738" }
              - { label: "ID Producto Lemon Squeezy", name: "lemon_product", widget: "string", default: "990310" }
              - { label: "Curso activo", name: "activo", widget: "boolean", default: true, hint: "Desactivar para ocultar el curso sin borrarlo" }
